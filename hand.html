<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand Tracker with Animal Stickers</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        /* 3D Canvas Background */
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Loading Screen */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Draggable PiP Container */
        #pip-window {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            background: #000;
            border: 3px solid #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }

        #pip-window:active {
            cursor: grabbing;
        }

        /* Flip video and canvas horizontally for a mirror effect */
        #webcam, #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            pointer-events: none;
        }

        #overlay-canvas {
            z-index: 2;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Loading AI Models & Webcam...</div>
    <div id="three-container"></div>
    
    <div id="pip-window">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        // ==========================================
        // 1. SETUP DRAGGABLE PiP WINDOW
        // ==========================================
        const pipWindow = document.getElementById('pip-window');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        pipWindow.addEventListener('pointerdown', (e) => {
            isDragging = true;
            const rect = pipWindow.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            pipWindow.setPointerCapture(e.pointerId);
        });

        pipWindow.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let newX = e.clientX - dragOffsetX;
            let newY = e.clientY - dragOffsetY;
            
            // Keep within bounds
            newX = Math.max(0, Math.min(newX, window.innerWidth - pipWindow.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - pipWindow.offsetHeight));

            pipWindow.style.left = `${newX}px`;
            pipWindow.style.top = `${newY}px`;
            pipWindow.style.right = 'auto'; // Clear right property after moving
        });

        pipWindow.addEventListener('pointerup', (e) => {
            isDragging = false;
            pipWindow.releasePointerCapture(e.pointerId);
        });

        // ==========================================
        // 2. SETUP THREE.JS SCENE
        // ==========================================
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting to make the hand look detailed and physical
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 10);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xdcdaff, 1.5);
        backLight.position.set(-5, -5, -10);
        scene.add(backLight);

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. BUILD DETAILED 3D HAND MODEL
        // ==========================================
        const jointGeometry = new THREE.SphereGeometry(0.4, 32, 32);
        const boneGeometry = new THREE.CylinderGeometry(0.25, 0.25, 1, 32);
        
        // High quality physical material for the hand
        const handMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffccaa, // Skin tone
            metalness: 0.1,
            roughness: 0.4,
            clearcoat: 0.3,
            clearcoatRoughness: 0.2
        });

        const joints = [];
        const bones = [];
        
        // MediaPipe 21 landmarks
        for (let i = 0; i < 21; i++) {
            const joint = new THREE.Mesh(jointGeometry, handMaterial);
            scene.add(joint);
            joints.push(joint);
        }

        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4], // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8], // Index
            [5, 9], [9, 10], [10, 11], [11, 12], // Middle
            [9, 13], [13, 14], [14, 15], [15, 16], // Ring
            [13, 17], [17, 18], [18, 19], [19, 20], // Pinky
            [0, 17], [5, 9], [9, 13], [13, 17] // Palm base/knuckles
        ];

        HAND_CONNECTIONS.forEach(() => {
            const bone = new THREE.Mesh(boneGeometry, handMaterial);
            scene.add(bone);
            bones.push(bone);
        });

        // ==========================================
        // 4. CREATE & ATTACH STICKERS
        // ==========================================
        // Function to create a texture out of an emoji
        function createEmojiTexture(emoji) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.font = '200px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // Slight Y offset for perfect centering depending on OS fonts
            ctx.fillText(emoji, 128, 140);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const stickersConfig = {
            4: '🐶',  // Thumb
            8: '🦁',  // Index
            12: '🐻', // Middle
            16: '🐱', // Ring
            20: '🐯'  // Pinky
        };

        const stickerMeshes = {};
        const stickerGeometry = new THREE.PlaneGeometry(1.5, 1.5);

        for (const [landmarkIndex, emoji] of Object.entries(stickersConfig)) {
            const material = new THREE.MeshBasicMaterial({
                map: createEmojiTexture(emoji),
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const sticker = new THREE.Mesh(stickerGeometry, material);
            scene.add(sticker);
            stickerMeshes[landmarkIndex] = sticker;
        }

        // ==========================================
        // 5. SETUP MEDIAPIPE & WEBCAM
        // ==========================================
        const video = document.getElementById('webcam');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        let handLandmarker;

        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            // Start Webcam
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                    document.getElementById('loading').style.display = 'none';
                    predictWebcam();
                });
            });
        }

        // ==========================================
        // 6. RENDER LOOP & TRACKING LOGIC
        // ==========================================
        let lastVideoTime = -1;

        function update3DHand(landmarks) {
            // Screen mapping multipliers
            const SCALE_X = 25;
            const SCALE_Y = 20;
            const SCALE_Z = 15;

            // 1. Update Joint Positions
            landmarks.forEach((landmark, index) => {
                // Mirror the X axis to match the mirrored video
                const x = -(landmark.x - 0.5) * SCALE_X;
                const y = -(landmark.y - 0.5) * SCALE_Y;
                const z = -landmark.z * SCALE_Z;

                joints[index].position.set(x, y, z);

                // Update Sticker positions to follow the specific joint
                if (stickerMeshes[index]) {
                    // Float slightly in front of the finger
                    stickerMeshes[index].position.set(x, y + 0.5, z + 0.5);
                    // Force sticker to always face the camera
                    stickerMeshes[index].lookAt(camera.position);
                }
            });

            // 2. Update Bone Orientations and Scales
            HAND_CONNECTIONS.forEach((connection, index) => {
                const startJoint = joints[connection[0]].position;
                const endJoint = joints[connection[1]].position;
                
                const bone = bones[index];
                const distance = startJoint.distanceTo(endJoint);
                
                // Position bone exactly in the middle of the two joints
                bone.position.copy(startJoint).lerp(endJoint, 0.5);
                
                // Scale bone length to match distance
                bone.scale.set(1, distance, 1);
                
                // Orient bone to point from start to end
                const direction = new THREE.Vector3().subVectors(endJoint, startJoint).normalize();
                const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
                bone.quaternion.copy(quaternion);
            });
        }

        function draw2DSkeleton(landmarks) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            // Apply mirroring to canvas drawing context
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-overlayCanvas.width, 0);

            // Draw Lines
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#00ff00";
            HAND_CONNECTIONS.forEach(conn => {
                const start = landmarks[conn[0]];
                const end = landmarks[conn[1]];
                ctx.beginPath();
                ctx.moveTo(start.x * overlayCanvas.width, start.y * overlayCanvas.height);
                ctx.lineTo(end.x * overlayCanvas.width, end.y * overlayCanvas.height);
                ctx.stroke();
            });

            // Draw Points
            ctx.fillStyle = "#ff0000";
            landmarks.forEach(lm => {
                ctx.beginPath();
                ctx.arc(lm.x * overlayCanvas.width, lm.y * overlayCanvas.height, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
            ctx.restore();
        }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0]; // Get primary hand
                    
                    // Show 3D objects
                    joints.forEach(j => j.visible = true);
                    bones.forEach(b => b.visible = true);
                    Object.values(stickerMeshes).forEach(s => s.visible = true);
                    
                    update3DHand(landmarks);
                    draw2DSkeleton(landmarks);
                } else {
                    // Hide objects if hand is lost
                    joints.forEach(j => j.visible = false);
                    bones.forEach(b => b.visible = false);
                    Object.values(stickerMeshes).forEach(s => s.visible = false);
                    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                }
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        // Boot up
        initMediaPipe();
    </script>
</body>
</html>
