<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Hand Tracker & Ventral Stickers</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
            font-family: sans-serif;
        }

        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #pip-window {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }

        #pip-window:active {
            cursor: grabbing;
        }

        #webcam, #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            pointer-events: none;
        }

        #overlay-canvas {
            z-index: 2;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Waking up AI & Camera...</div>
    <div id="three-container"></div>
    
    <div id="pip-window">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        // ==========================================
        // 1. DRAGGABLE PiP WINDOW LOGIC
        // ==========================================
        const pipWindow = document.getElementById('pip-window');
        let isDragging = false, dragOffsetX = 0, dragOffsetY = 0;

        pipWindow.addEventListener('pointerdown', (e) => {
            isDragging = true;
            const rect = pipWindow.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            pipWindow.setPointerCapture(e.pointerId);
        });

        pipWindow.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let newX = e.clientX - dragOffsetX;
            let newY = e.clientY - dragOffsetY;
            newX = Math.max(0, Math.min(newX, window.innerWidth - pipWindow.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - pipWindow.offsetHeight));
            pipWindow.style.left = `${newX}px`;
            pipWindow.style.top = `${newY}px`;
            pipWindow.style.right = 'auto';
        });

        pipWindow.addEventListener('pointerup', (e) => {
            isDragging = false;
            pipWindow.releasePointerCapture(e.pointerId);
        });

        // ==========================================
        // 2. THREE.JS SCENE SETUP
        // ==========================================
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        // Soft, realistic studio lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const mainLight = new THREE.DirectionalLight(0xffeedd, 2.0);
        mainLight.position.set(5, 10, 15);
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0xaaccff, 1.2);
        fillLight.position.set(-10, -5, 10);
        scene.add(fillLight);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. REALISTIC FLESHY HAND CONSTRUCTION
        // ==========================================
        const skinMaterial = new THREE.MeshStandardMaterial({
            color: 0xdf997e,
            roughness: 0.35,
            metalness: 0.1,
        });

        const joints = [];
        const bones = [];
        const palmWebbings = [];

        // Exact anatomical thickness mapping
        function getRadius(i) {
            if (i === 0) return 0.9; // Wrist
            if ([1,2,3].includes(i)) return 0.7; // Thumb
            if (i === 4) return 0.55; // Thumb tip
            if ([5,9,13,17].includes(i)) return 0.65; // Knuckles
            if ([6,10,14,18].includes(i)) return 0.55; // Mid joints
            if ([7,11,15,19].includes(i)) return 0.5; // Distal joints
            if ([8,12,16,20].includes(i)) return 0.45; // Finger tips
            return 0.5;
        }

        // Generate 21 Spherical Joints
        for (let i = 0; i < 21; i++) {
            const r = getRadius(i);
            const jointMesh = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), skinMaterial);
            scene.add(jointMesh);
            joints.push(jointMesh);
        }

        // Tapered Cylinder generator to connect joints seamlessly
        function createBone(radiusEnd, radiusStart) {
            // Origin centered at the BOTTOM so it pivots perfectly from the start joint
            const geom = new THREE.CylinderGeometry(radiusEnd, radiusStart, 1, 32);
            geom.translate(0, 0.5, 0); 
            const mesh = new THREE.Mesh(geom, skinMaterial);
            scene.add(mesh);
            return mesh;
        }

        const HAND_CONNECTIONS = [
            [0,1], [1,2], [2,3], [3,4],       // Thumb
            [0,5], [5,6], [6,7], [7,8],       // Index
            [5,9], [9,10], [10,11], [11,12],  // Middle
            [9,13], [13,14], [14,15], [15,16],// Ring
            [13,17], [17,18], [18,19], [19,20]// Pinky
        ];

        // Create finger bones
        HAND_CONNECTIONS.forEach(conn => {
            bones.push(createBone(getRadius(conn[1]), getRadius(conn[0])));
        });

        // Create Solid Palm filler connections
        const PALM_CONNECTIONS = [[0,9], [0,13], [1,5], [5,9], [9,13], [13,17]];
        PALM_CONNECTIONS.forEach(conn => {
            palmWebbings.push(createBone(getRadius(conn[1]), getRadius(conn[0])));
        });

        // ==========================================
        // 4. VENTRAL STICKERS
        // ==========================================
        function createStickerMaterial(emoji) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.font = '200px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 128, 140);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return new THREE.MeshBasicMaterial({ 
                map: texture, transparent: true, depthWrite: false, side: THREE.DoubleSide 
            });
        }

        const stickersConfig = {
            4: '🐶',  // Thumb
            8: '🦁',  // Index
            12: '🐻', // Middle
            16: '🐱', // Ring
            20: '🐯'  // Pinky
        };

        const stickerSize = 1.6;
        const stickerGeom = new THREE.PlaneGeometry(stickerSize, stickerSize);
        const stickerMeshes = {};

        for (const [landmarkIndex, emoji] of Object.entries(stickersConfig)) {
            const mat = createStickerMaterial(emoji);
            const stickerMesh = new THREE.Mesh(stickerGeom, mat);
            scene.add(stickerMesh);
            stickerMeshes[landmarkIndex] = stickerMesh;
        }

        // ==========================================
        // 5. MEDIAPIPE & WEBCAM LOGIC
        // ==========================================
        const video = document.getElementById('webcam');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        let handLandmarker;

        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                    document.getElementById('loading').style.display = 'none';
                    predictWebcam();
                });
            });
        }

        // ==========================================
        // 6. 3D MATH & RENDER LOOP
        // ==========================================
        let lastVideoTime = -1;

        function update3DHand(landmarks, handednessStr) {
            const SCALE = 25;

            // 1. Position Joints
            landmarks.forEach((lm, index) => {
                const x = -(lm.x - 0.5) * SCALE;
                const y = -(lm.y - 0.5) * SCALE * (overlayCanvas.height / overlayCanvas.width); 
                const z = -lm.z * SCALE;
                joints[index].position.set(x, y, z);
            });

            // 2. Position and Scale Tapered Bones (Guaranteed no detachment)
            const alignBone = (startJoint, endJoint, boneMesh) => {
                const start = startJoint.position;
                const end = endJoint.position;
                const distance = start.distanceTo(end);
                
                boneMesh.position.copy(start); // Anchor to start
                const dir = new THREE.Vector3().subVectors(end, start).normalize();
                
                // Perfectly orient Y-axis to point at the next joint
                boneMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
                boneMesh.scale.set(1, distance, 1); // Stretch to reach
            };

            HAND_CONNECTIONS.forEach((conn, index) => {
                alignBone(joints[conn[0]], joints[conn[1]], bones[index]);
            });

            PALM_CONNECTIONS.forEach((conn, index) => {
                alignBone(joints[conn[0]], joints[conn[1]], palmWebbings[index]);
            });

            // 3. Orient Stickers perfectly to the Ventral (Palm) Surface
            const pos0 = joints[0].position;
            const pos5 = joints[5].position;
            const pos17 = joints[17].position;
            
            // Calculate which way the palm is facing
            const v1 = new THREE.Vector3().subVectors(pos5, pos0);
            const v2 = new THREE.Vector3().subVectors(pos17, pos0);
            let palmNormal = new THREE.Vector3().crossVectors(v1, v2).normalize();
            
            // Adjust for left/right hand mirroring
            if (handednessStr === 'Left') {
                palmNormal.negate();
            }

            for (const [indexStr, sticker] of Object.entries(stickerMeshes)) {
                const i = parseInt(indexStr);
                const tipPos = joints[i].position;
                const prevPos = joints[i - 1].position; // The joint right below the tip

                // Up direction is the direction the finger is pointing
                const dirY = new THREE.Vector3().subVectors(tipPos, prevPos).normalize();
                
                // Calculate orthographic orientation matrix
                const dirZ = palmNormal.clone(); 
                const dirX = new THREE.Vector3().crossVectors(dirY, dirZ).normalize();
                dirZ.crossVectors(dirX, dirY).normalize();

                const matrix = new THREE.Matrix4().makeBasis(dirX, dirY, dirZ);
                sticker.quaternion.setFromRotationMatrix(matrix);

                // Offset the sticker so it sits ON top of the skin, not inside the bone
                const fingerRadius = getRadius(i);
                sticker.position.copy(tipPos);
                sticker.position.add(dirZ.multiplyScalar(fingerRadius + 0.1));
            }
        }

        function draw2DSkeleton(landmarks) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-overlayCanvas.width, 0);

            ctx.lineWidth = 3;
            ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
            HAND_CONNECTIONS.forEach(conn => {
                const start = landmarks[conn[0]];
                const end = landmarks[conn[1]];
                ctx.beginPath();
                ctx.moveTo(start.x * overlayCanvas.width, start.y * overlayCanvas.height);
                ctx.lineTo(end.x * overlayCanvas.width, end.y * overlayCanvas.height);
                ctx.stroke();
            });

            ctx.fillStyle = "#ff0055";
            landmarks.forEach(lm => {
                ctx.beginPath();
                ctx.arc(lm.x * overlayCanvas.width, lm.y * overlayCanvas.height, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
            ctx.restore();
        }

        function setVisibility(visible) {
            scene.children.forEach(child => {
                if (child.type === 'Mesh' && child.geometry.type !== 'PlaneGeometry') {
                    child.visible = visible; // Toggle hand visibility
                }
            });
            Object.values(stickerMeshes).forEach(s => s.visible = visible);
        }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    setVisibility(true);
                    const landmarks = results.landmarks[0];
                    const handedness = results.handednesses?.[0]?.[0]?.categoryName || 'Right'; 
                    
                    update3DHand(landmarks, handedness);
                    draw2DSkeleton(landmarks);
                } else {
                    setVisibility(false);
                    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        initMediaPipe();
    </script>
</body>
</html>
