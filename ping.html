<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hand Tracking Ping Pong</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
            touch-action: none; /* Prevent mobile scroll */
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Draggable Camera Container */
        #cameraContainer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            background: #222;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: grab;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cameraContainer:active {
            cursor: grabbing;
        }

        /* Mirror the feed for a natural selfie-view */
        #debugCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none; /* Let drag events pass to container */
        }

        #videoElement {
            display: none; /* Hide raw video; we draw directly to canvas */
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loading">Initializing Camera & Hand Tracking...<br><small>Please allow camera access</small></div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="cameraContainer">
        <video id="videoElement" playsinline></video>
        <canvas id="debugCanvas" width="240" height="180"></canvas>
    </div>

    <script>
        // --- 1. GAME SETUP & RESIZING ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let W, H;
        let paddleW, paddleH;
        let p1Y, p2Y, targetP1Y, targetP2Y;
        let ball = { x: 0, y: 0, vx: 0, vy: 0, r: 0 };

        function resizeCanvas() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            
            // Dynamic sizing based on screen size
            paddleW = Math.max(10, W * 0.015);
            paddleH = Math.max(60, H * 0.2);
            ball.r = Math.max(5, W * 0.01);
            
            p1Y = p2Y = targetP1Y = targetP2Y = H / 2 - paddleH / 2;
            resetBall();
        }

        function resetBall() {
            ball.x = W / 2;
            ball.y = H / 2;
            // Velocity scales with screen width
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * (W * 0.005 + 3); 
            ball.vy = (Math.random() * 2 - 1) * (H * 0.005 + 3);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 2. GAME LOGIC & DRAWING ---
        function updateGame() {
            // Smoothly move paddles toward target positions (Lerp)
            p1Y += (targetP1Y - p1Y) * 0.15;
            p2Y += (targetP2Y - p2Y) * 0.15;

            // Clamp paddles within screen bounds
            p1Y = Math.max(0, Math.min(H - paddleH, p1Y));
            p2Y = Math.max(0, Math.min(H - paddleH, p2Y));

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Top/Bottom Wall Bounce
            if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }
            if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -1; }

            // Player 1 (Left) Paddle Collision
            let p1X = W * 0.05;
            if (ball.x - ball.r < p1X + paddleW && ball.x + ball.r > p1X && ball.y > p1Y && ball.y < p1Y + paddleH) {
                ball.x = p1X + paddleW + ball.r; // Push out to prevent clipping
                ball.vx *= -1.05; // Speed up slightly
                ball.vy += (ball.y - (p1Y + paddleH / 2)) * 0.05; // Apply spin based on hit location
            }

            // Player 2 (Right) Paddle Collision
            let p2X = W * 0.95 - paddleW;
            if (ball.x + ball.r > p2X && ball.x - ball.r < p2X + paddleW && ball.y > p2Y && ball.y < p2Y + paddleH) {
                ball.x = p2X - ball.r; // Push out
                ball.vx *= -1.05;
                ball.vy += (ball.y - (p2Y + paddleH / 2)) * 0.05;
            }

            // Score / Out of bounds
            if (ball.x < 0 || ball.x > W) resetBall();
        }

        function drawGame() {
            // Background
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = 'white';

            // Draw Paddles
            ctx.fillRect(W * 0.05, p1Y, paddleW, paddleH);
            ctx.fillRect(W * 0.95 - paddleW, p2Y, paddleW, paddleH);

            // Draw Center Dashed Line
            ctx.setLineDash([15, 15]);
            ctx.beginPath();
            ctx.moveTo(W / 2, 0);
            ctx.lineTo(W / 2, H);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]); // Reset

            // Draw Ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }
        gameLoop(); // Start Game Loop

        // --- 3. HAND POSTURE CALCULATION ---
        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        function calculateFoldExtent(landmarks) {
            const wrist = landmarks[0];
            const palmBase = landmarks[9]; // Base of middle finger
            const palmLength = getDistance(wrist, palmBase);

            // Fingertips (Index, Middle, Ring, Pinky)
            const tips = [8, 12, 16, 20];
            let avgTipDistance = 0;
            
            tips.forEach(tip => {
                avgTipDistance += getDistance(wrist, landmarks[tip]);
            });
            avgTipDistance /= tips.length;

            // Ratio: (Distance to fingertips) / (Palm length)
            // Fist ~ 0.8, Fully Extended ~ 2.2
            return avgTipDistance / palmLength;
        }

        // --- 4. MEDIAPIPE INTEGRATION ---
        const videoElement = document.getElementById('videoElement');
        const debugCanvas = document.getElementById('debugCanvas');
        const debugCtx = debugCanvas.getContext('2d');

        function onResults(results) {
            // Hide loading text on first frame
            document.getElementById('loading').style.display = 'none';

            // Draw camera feed to debug canvas
            debugCtx.save();
            debugCtx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
            debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Draw Skeleton
                    drawConnectors(debugCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                    drawLandmarks(debugCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 2});

                    // Calculate fold and map to paddle Y position
                    let foldRatio = calculateFoldExtent(landmarks);
                    let clampedRatio = Math.max(0.8, Math.min(2.2, foldRatio));
                    
                    // Map [0.8 (Folded), 2.2 (Extended)] -> [Canvas Bottom, Canvas Top]
                    // We invert the map because 0 is Top and H is Bottom in Canvas
                    let mappedY = (1 - ((clampedRatio - 0.8) / 1.4)) * (H - paddleH);

                    // Determine Left or Right Hand (Unmirrored feed: x > 0.5 is left physical hand)
                    if (landmarks[0].x > 0.5) {
                        targetP1Y = mappedY; // Control Left Paddle
                    } else {
                        targetP2Y = mappedY; // Control Right Paddle
                    }
                }
            }
            debugCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 240,
            height: 180
        });
        camera.start();

        // --- 5. DRAGGABLE CAMERA WINDOW (Desktop & Mobile) ---
        const camContainer = document.getElementById('cameraContainer');
        let isDragging = false, dragStartX = 0, dragStartY = 0, initialLeft = 0, initialTop = 0;

        function onDragStart(e) {
            isDragging = true;
            let event = e.type.includes('touch') ? e.touches[0] : e;
            dragStartX = event.clientX;
            dragStartY = event.clientY;
            initialLeft = camContainer.offsetLeft;
            initialTop = camContainer.offsetTop;
        }

        function onDragMove(e) {
            if (!isDragging) return;
            e.preventDefault(); // Prevent scrolling on touch devices
            
            let event = e.type.includes('touch') ? e.touches[0] : e;
            let dx = event.clientX - dragStartX;
            let dy = event.clientY - dragStartY;
            
            camContainer.style.left = (initialLeft + dx) + 'px';
            camContainer.style.top = (initialTop + dy) + 'px';
            camContainer.style.right = 'auto'; // Disable CSS right property so 'left' takes priority
        }

        function onDragEnd() {
            isDragging = false;
        }

        camContainer.addEventListener('mousedown', onDragStart);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);

        camContainer.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);

    </script>
</body>
</html>
