<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bear</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #fce4ec; /* Changed background so you know it's the new version */
            font-family: sans-serif;
            touch-action: none;
        }

        #bear-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        svg {
            width: 100%; height: 100%;
            max-width: 800px; max-height: 800px;
        }

        #draggable-overlay {
            position: absolute; top: 20px; left: 20px;
            width: 160px;
            background: #2c3e50; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 1000; cursor: grab; user-select: none;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #draggable-overlay:active { cursor: grabbing; }

        #overlay-header {
            color: #ecf0f1; font-size: 12px; font-weight: bold;
            text-align: center; padding: 8px;
            background: #34495e; border-bottom: 2px solid #2c3e50;
        }

        #video-container {
            position: relative; width: 100%; height: 120px; background: #000;
        }
        video { display: none; }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px; font-weight: bold; color: #2c3e50;
            z-index: 500; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Camera...</div>

    <div id="draggable-overlay">
        <div id="overlay-header">::: Drag Me :::</div>
        <div id="video-container">
            <video id="input_video" autoplay playsinline></video>
            <canvas id="output_canvas" width="160" height="120"></canvas>
        </div>
    </div>

    <div id="bear-container">
        <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <g id="bear-arm-r">
                <rect x="310" y="235" width="80" height="30" rx="15" fill="#5D4037" />
                <circle cx="380" cy="250" r="18" fill="#4E342E" />
            </g>
            <g id="bear-leg-r">
                <rect x="275" y="330" width="40" height="90" rx="20" fill="#5D4037" />
                <ellipse cx="295" cy="415" rx="25" ry="15" fill="#4E342E" />
            </g>
            <ellipse cx="250" cy="290" rx="75" ry="95" fill="#795548" />
            <ellipse cx="250" cy="305" rx="45" ry="60" fill="#D7CCC8" />
            <g id="bear-arm-l">
                <rect x="110" y="235" width="80" height="30" rx="15" fill="#8D6E63" />
                <circle cx="120" cy="250" r="18" fill="#6D4C41" />
            </g>
            <g id="bear-leg-l">
                <rect x="185" y="330" width="40" height="90" rx="20" fill="#8D6E63" />
                <ellipse cx="205" cy="415" rx="25" ry="15" fill="#6D4C41" />
            </g>
            <g id="bear-head">
                <circle cx="200" cy="155" r="20" fill="#795548" />
                <circle cx="200" cy="155" r="10" fill="#D7CCC8" />
                <circle cx="300" cy="155" r="20" fill="#795548" />
                <circle cx="300" cy="155" r="10" fill="#D7CCC8" />
                <circle cx="250" cy="190" r="50" fill="#795548" />
                <ellipse cx="250" cy="210" rx="25" ry="18" fill="#D7CCC8" />
                <circle cx="250" cy="202" r="8" fill="#212121" />
                <path d="M 240 215 Q 250 225 260 215" stroke="#212121" stroke-width="2" fill="none" />
                <circle cx="230" cy="180" r="6" fill="#212121" />
                <circle cx="270" cy="180" r="6" fill="#212121" />
                <circle cx="232" cy="178" r="2" fill="#FFFFFF" />
                <circle cx="272" cy="178" r="2" fill="#FFFFFF" />
            </g>
        </svg>
    </div>

    <script>
        // --- 1. DRAGGABLE OVERLAY LOGIC ---
        const overlay = document.getElementById('draggable-overlay');
        const header = document.getElementById('overlay-header');
        let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 20, yOffset = 20;

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === overlay || e.target === header || e.target.parentNode === header) isDragging = true;
        }

        function dragEnd() { isDragging = false; }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX; yOffset = currentY;
                overlay.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        overlay.addEventListener("touchstart", dragStart, { passive: false });
        overlay.addEventListener("touchend", dragEnd, { passive: false });
        overlay.addEventListener("touchmove", drag, { passive: false });
        overlay.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);


        // --- 2. BEAR ANIMATION SETUP ---
        const bearParts = {
            head: document.getElementById('bear-head'),
            armL: document.getElementById('bear-arm-l'),
            armR: document.getElementById('bear-arm-r'),
            legL: document.getElementById('bear-leg-l'),
            legR: document.getElementById('bear-leg-r')
        };

        let currentRot = { head: 0, armL: 0, armR: 0, legL: 0, legR: 0 };
        let targetRot = { head: 0, armL: 0, armR: 0, legL: 0, legR: 0 };

        function animateBear() {
            const lerpSpeed = 0.2; // Smooth snapping
            for (let part in currentRot) {
                currentRot[part] += (targetRot[part] - currentRot[part]) * lerpSpeed;
            }

            bearParts.head.setAttribute('transform', `rotate(${currentRot.head} 250 210)`);
            bearParts.armL.setAttribute('transform', `rotate(${currentRot.armL} 180 250)`);
            bearParts.armR.setAttribute('transform', `rotate(${currentRot.armR} 320 250)`);
            bearParts.legL.setAttribute('transform', `rotate(${currentRot.legL} 205 340)`);
            bearParts.legR.setAttribute('transform', `rotate(${currentRot.legR} 295 340)`);

            requestAnimationFrame(animateBear);
        }
        animateBear();

        // --- 3. BINARY FINGER FOLD DETECTION ---
        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        function isFolded(landmarks, tipIdx, pipIdx) {
            const wrist = landmarks[0];
            const tip = landmarks[tipIdx];
            const pip = landmarks[pipIdx];
            // If the distance from wrist to tip is less than wrist to PIP joint, it's folded
            return getDistance(wrist, tip) < getDistance(wrist, pip);
        }

        function isThumbFolded(landmarks) {
            const thumbTip = landmarks[4];
            const pinkyBase = landmarks[17];
            const indexBase = landmarks[5];
            // If thumb is closer to the base of the pinky than the palm is wide, it's folded inward
            return getDistance(thumbTip, pinkyBase) < getDistance(indexBase, pinkyBase);
        }

        // --- 4. MEDIAPIPE LOGIC ---
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        function onResults(results) {
            if (loadingText.style.display !== 'none') loadingText.style.display = 'none';

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 2});

                // --- APPLY BINARY LOGIC ---
                // Middle (12) -> Head. Folded: tilt right 30deg. Extended: 0.
                targetRot.head = isFolded(landmarks, 12, 10) ? 30 : 0;

                // Index (8) -> Left Arm. Folded: raise 80deg. Extended: 0.
                targetRot.armL = isFolded(landmarks, 8, 6) ? -80 : 0;

                // Ring (16) -> Right Arm. Folded: raise 80deg. Extended: 0.
                targetRot.armR = isFolded(landmarks, 16, 14) ? 80 : 0;

                // Thumb (4) -> Left Leg. Folded: kick 60deg. Extended: 0.
                targetRot.legL = isThumbFolded(landmarks) ? -60 : 0;

                // Pinky (20) -> Right Leg. Folded: kick 60deg. Extended: 0.
                targetRot.legR = isFolded(landmarks, 20, 18) ? 60 : 0;

            } else {
                // Default rest pose if no hand
                targetRot = { head: 0, armL: 0, armR: 0, legL: 0, legR: 0 };
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({
            maxNumHands: 1, modelComplexity: 1,
            minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 320, height: 240, facingMode: 'user'
        });
        camera.start();
    </script>
</body>
</html>
