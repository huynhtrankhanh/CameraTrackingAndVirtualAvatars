<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tiger Avatar - Dual Instance</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root { --bg-color: #1a1a2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); overflow: hidden; font-family: system-ui, sans-serif; touch-action: none; }

        /* Main Scene */
        #scene {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        svg { width: 100%; height: 100%; max-width: 1200px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4)); }

        /* Draggable PIP Window */
        #pip-window {
            position: fixed; bottom: 20px; right: 20px; width: 180px; height: 240px;
            background: #000; border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.1);
            z-index: 100; cursor: grab; display: flex; flex-direction: column;
        }
        #pip-window:active { cursor: grabbing; }
        @media (min-width: 768px) { #pip-window { width: 240px; height: 180px; } }

        .drag-handle {
            height: 24px; background: rgba(40, 40, 40, 0.9); display: flex;
            align-items: center; justify-content: center; color: #888;
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            user-select: none; pointer-events: none;
        }
        .drag-handle::before { content: ""; width: 30px; height: 4px; background: #666; border-radius: 2px; }
        #pip-video-container { position: relative; flex: 1; background: #111; }

        .mirrored { transform: scaleX(-1); }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; } /* Hide raw video */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* Loading Overlay */
        #loading {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); color: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255, 140, 0, 0.3);
            border-top: 4px solid #FF8C00; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="font-weight: 500;">Booting AI Models...</h2>
        <p style="color: #aaa; margin-top: 8px; font-size: 14px;">Initializing Face & Hand tracking.</p>
    </div>

    <div id="scene">
        <svg viewBox="-600 -600 1200 1200" preserveAspectRatio="xMidYMid meet">
            <g id="tiger-body" transform="translate(0, 150)">
                <path d="M-250,500 C-300,100 -200,-50 0,-150 C200,-50 300,100 250,500 Z" fill="#E67E22" />
                <path d="M-150,500 C-180,200 -100,50 0,0 C100,50 180,200 150,500 Z" fill="#FAD7A1" />
                <path d="M-220,100 Q-150,80 -180,140 Z" fill="#111" />
                <path d="M220,100 Q150,80 180,140 Z" fill="#111" />
                <path d="M-240,250 Q-150,220 -190,290 Z" fill="#111" />
                <path d="M240,250 Q150,220 190,290 Z" fill="#111" />
            </g>

            <g id="paw-l">
                <g id="paw-l-mesh">
                    <circle cx="0" cy="0" r="100" fill="#E67E22" />
                    <path d="M-60,-80 Q-60,-120 -80,-100 Z" fill="#fff" />
                    <path d="M-20,-95 Q-20,-140 -35,-120 Z" fill="#fff" />
                    <path d="M20,-95 Q20,-140 35,-120 Z" fill="#fff" />
                    <path d="M60,-80 Q60,-120 80,-100 Z" fill="#fff" />
                    <circle cx="0" cy="20" r="40" fill="#D35400" />
                    <circle cx="-50" cy="-30" r="20" fill="#D35400" />
                    <circle cx="-15" cy="-50" r="20" fill="#D35400" />
                    <circle cx="20" cy="-50" r="20" fill="#D35400" />
                    <circle cx="55" cy="-30" r="20" fill="#D35400" />
                    <path d="M-100,0 Q-60,-10 -90,20 Z" fill="#111" />
                    <path d="M100,0 Q60,-10 90,20 Z" fill="#111" />
                </g>
            </g>

            <g id="paw-r">
                <g id="paw-r-mesh">
                    <circle cx="0" cy="0" r="100" fill="#E67E22" />
                    <path d="M-60,-80 Q-60,-120 -80,-100 Z" fill="#fff" />
                    <path d="M-20,-95 Q-20,-140 -35,-120 Z" fill="#fff" />
                    <path d="M20,-95 Q20,-140 35,-120 Z" fill="#fff" />
                    <path d="M60,-80 Q60,-120 80,-100 Z" fill="#fff" />
                    <circle cx="0" cy="20" r="40" fill="#D35400" />
                    <circle cx="-50" cy="-30" r="20" fill="#D35400" />
                    <circle cx="-15" cy="-50" r="20" fill="#D35400" />
                    <circle cx="20" cy="-50" r="20" fill="#D35400" />
                    <circle cx="55" cy="-30" r="20" fill="#D35400" />
                    <path d="M-100,0 Q-60,-10 -90,20 Z" fill="#111" />
                    <path d="M100,0 Q60,-10 90,20 Z" fill="#111" />
                </g>
            </g>

            <g id="head" transform="translate(0, -20)">
                <g id="ears">
                    <path d="M-160,-120 C-250,-250 -100,-280 -80,-180 Z" fill="#E67E22" />
                    <path d="M-150,-140 C-210,-220 -110,-240 -100,-170 Z" fill="#fff" />
                    <path d="M-140,-150 C-180,-200 -120,-210 -110,-160 Z" fill="#F1948A" />
                    <path d="M160,-120 C250,-250 100,-280 80,-180 Z" fill="#E67E22" />
                    <path d="M150,-140 C210,-220 110,-240 100,-170 Z" fill="#fff" />
                    <path d="M140,-150 C180,-200 120,-210 110,-160 Z" fill="#F1948A" />
                </g>

                <path d="M-220,50 Q-280,150 -180,180 Q-240,250 -120,220 Z" fill="#fff" />
                <path d="M220,50 Q280,150 180,180 Q240,250 120,220 Z" fill="#fff" />

                <ellipse cx="0" cy="0" rx="200" ry="180" fill="#FF8C00" />

                <path d="M0,-180 L-20,-110 L20,-110 Z" fill="#111" />
                <path d="M-60,-170 L-50,-100 L-30,-120 Z" fill="#111" />
                <path d="M60,-170 L50,-100 L30,-120 Z" fill="#111" />
                <path d="M-200,-50 L-130,-40 L-200,-20 Z" fill="#111" />
                <path d="M200,-50 L130,-40 L200,-20 Z" fill="#111" />
                <path d="M-195,20 L-120,40 L-190,60 Z" fill="#111" />
                <path d="M195,20 L120,40 L190,60 Z" fill="#111" />

                <ellipse cx="0" cy="80" rx="110" ry="80" fill="#FFF" />
                <path d="M-40,60 C-40,40 40,40 40,60 L0,100 Z" fill="#F1948A" />
                
                <path d="M0,100 L0,110" stroke="#111" stroke-width="6" stroke-linecap="round" fill="none"/>
                <path id="mouth-hole" d="M-40,110 Q0,130 40,110 Q0,130 -40,110 Z" fill="#5A1A1A" />
                <path id="mouth-lip" d="M-40,110 Q0,130 40,110" stroke="#111" stroke-width="6" fill="none" stroke-linecap="round"/>

                <path d="M-60,90 L-180,70 M-70,110 L-190,110 M-60,130 L-170,150" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M60,90 L180,70 M70,110 L190,110 M60,130 L170,150" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>

                <g id="eye-l">
                    <path d="M-120,-30 Q-80,-70 -40,-20 Q-80,10 -120,-30 Z" fill="#fff" stroke="#111" stroke-width="8" stroke-linejoin="round"/>
                    <circle cx="-75" cy="-25" r="18" fill="#F1C40F" />
                    <circle cx="-75" cy="-25" r="8" fill="#111" />
                    <circle cx="-80" cy="-30" r="4" fill="#fff" />
                </g>
                <g id="eye-r">
                    <path d="M120,-30 Q80,-70 40,-20 Q80,10 120,-30 Z" fill="#fff" stroke="#111" stroke-width="8" stroke-linejoin="round"/>
                    <circle cx="75" cy="-25" r="18" fill="#F1C40F" />
                    <circle cx="75" cy="-25" r="8" fill="#111" />
                    <circle cx="70" cy="-30" r="4" fill="#fff" />
                </g>
            </g>
        </svg>
    </div>

    <div id="pip-window">
        <div class="drag-handle"></div>
        <div id="pip-video-container">
            <video id="input-video" playsinline muted></video>
            <canvas id="output-canvas" class="mirrored"></canvas>
        </div>
    </div>

    <script>
        // --- 1. State & Lerp ---
        const pawLEl = document.getElementById('paw-l'); 
        const pawREl = document.getElementById('paw-r'); 
        const mouthHoleEl = document.getElementById('mouth-hole');
        const mouthLipEl = document.getElementById('mouth-lip');

        const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

        const state = {
            mouthOpen: 0, targetMouthOpen: 0,
            pawL: { x: -300, y: 300, angle: 0, targetX: -300, targetY: 300, targetAngle: 0, visible: true },
            pawR: { x: 300, y: 300, angle: 0, targetX: 300, targetY: 300, targetAngle: 0, visible: true }
        };

        const lerpAmt = 0.25; 

        function animateSVG() {
            // Animate Mouth
            state.mouthOpen = lerp(state.mouthOpen, state.targetMouthOpen, 0.4); // Faster lerp for snappy mouth
            const baseDip = 130;
            const bottomDip = baseDip + state.mouthOpen;
            
            // Draw upper curve, then draw lower curve back to start
            mouthHoleEl.setAttribute('d', `M-40,110 Q0,${baseDip} 40,110 Q0,${bottomDip} -40,110 Z`);
            mouthLipEl.setAttribute('d', `M-40,110 Q0,${bottomDip} 40,110`);

            // Animate Paws
            ['pawL', 'pawR'].forEach(paw => {
                const p = state[paw];
                p.x = lerp(p.x, p.targetX, lerpAmt);
                p.y = lerp(p.y, p.targetY, lerpAmt);
                p.angle = lerp(p.angle, p.targetAngle, lerpAmt);
                const el = paw === 'pawL' ? pawLEl : pawREl;
                el.setAttribute('transform', `translate(${p.x}, ${p.y}) rotate(${p.angle})`);
                el.style.opacity = p.visible ? 1 : 0.2; 
            });

            requestAnimationFrame(animateSVG);
        }
        animateSVG(); 

        // --- 2. Decoupled MediaPipe Logic ---
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading');

        // Central store for latest tracking data to render independently
        let trackingData = { face: null, hands: null, videoFrame: null };
        let modelsLoaded = { face: false, hands: false };

        function checkInit() {
            if (modelsLoaded.face && modelsLoaded.hands) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
            }
        }

        // FaceMesh Callback
        function onFaceResults(results) {
            if (!modelsLoaded.face) { modelsLoaded.face = true; checkInit(); }
            trackingData.face = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null;

            if (trackingData.face) {
                // Calculate mouth openness
                const topLip = trackingData.face[13];
                const bottomLip = trackingData.face[14];
                const topHead = trackingData.face[10];
                const chin = trackingData.face[152];
                
                const lipDist = Math.abs(bottomLip.y - topLip.y);
                const faceHeight = Math.abs(chin.y - topHead.y);
                const ratio = lipDist / faceHeight;
                
                // Map the ratio to pixels for the SVG curve (e.g. up to 80px drop)
                const openAmount = Math.max(0, (ratio - 0.015) * 800); 
                state.targetMouthOpen = Math.min(80, openAmount);
            } else {
                state.targetMouthOpen = 0;
            }
        }

        // Hands Callback
        function onHandResults(results) {
            if (!modelsLoaded.hands) { modelsLoaded.hands = true; checkInit(); }
            trackingData.hands = results;

            let foundLeft = false;
            let foundRight = false;

            if (results.multiHandLandmarks && results.multiHandedness) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const classification = results.multiHandedness[index].label; 
                    // MediaPipe returns physical handedness. 
                    // To control Left Screen Paw, we use physical Right hand (which appears on the left due to mirroring)
                    const isRightHand = classification === 'Right';
                    
                    const wrist = landmarks[0];
                    const middleFinger = landmarks[9];
                    
                    if (isRightHand) {
                        foundLeft = true; // Maps to Screen Left Paw
                        state.pawL.visible = true;
                        state.pawL.targetX = (0.5 - wrist.x) * 1400 - 250; 
                        state.pawL.targetY = (wrist.y - 0.5) * 1200 + 200; 
                        const dx = (0.5 - middleFinger.x) - (0.5 - wrist.x);
                        const dy = middleFinger.y - wrist.y;
                        state.pawL.targetAngle = (Math.atan2(dy, dx) * (180 / Math.PI)) + 90;
                    } else {
                        foundRight = true; // Maps to Screen Right Paw
                        state.pawR.visible = true;
                        state.pawR.targetX = (0.5 - wrist.x) * 1400 + 250; 
                        state.pawR.targetY = (wrist.y - 0.5) * 1200 + 200; 
                        const dx = (0.5 - middleFinger.x) - (0.5 - wrist.x);
                        const dy = middleFinger.y - wrist.y;
                        state.pawR.targetAngle = (Math.atan2(dy, dx) * (180 / Math.PI)) + 90;
                    }
                });
            }

            if (!foundLeft) { state.pawL.visible = false; state.pawL.targetY = 400; }
            if (!foundRight) { state.pawR.visible = false; state.pawR.targetY = 400; }
        }

        // Decoupled Render Loop for the PIP Canvas
        function renderCanvas() {
            if (videoElement.readyState >= 2) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                canvasCtx.save();
                
                // Draw Video (Mirrored via CSS, but we draw it normal here, CSS handles the flip)
                canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

                // Draw Face Mesh
                if (trackingData.face) {
                    drawConnectors(canvasCtx, trackingData.face, FACEMESH_TESSELATION, {color: '#C0C0C040', lineWidth: 1});
                    // Highlight mouth
                    drawConnectors(canvasCtx, trackingData.face, FACEMESH_LIPS, {color: '#FF0000', lineWidth: 2});
                }

                // Draw Hands
                if (trackingData.hands && trackingData.hands.multiHandLandmarks) {
                    for (const landmarks of trackingData.hands.multiHandLandmarks) {
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                        drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 2});
                    }
                }
                
                canvasCtx.restore();
            }
            requestAnimationFrame(renderCanvas);
        }
        renderCanvas();

        // --- 3. Initialize MediaPipe Instances ---
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onFaceResults);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onHandResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Send frame to both instances simultaneously
                await Promise.all([
                    faceMesh.send({image: videoElement}),
                    hands.send({image: videoElement})
                ]);
            },
            width: 480, height: 360, facingMode: 'user'
        });
        camera.start();

        // --- 4. Draggable PIP Window Logic ---
        const pip = document.getElementById('pip-window');
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        pip.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX; startY = e.clientY;
            const rect = pip.getBoundingClientRect();
            initialLeft = rect.left; initialTop = rect.top;

            pip.setPointerCapture(e.pointerId);
            pip.style.bottom = 'auto'; pip.style.right = 'auto';
            pip.style.left = `${initialLeft}px`; pip.style.top = `${initialTop}px`;
            pip.style.transition = 'none';
        });

        pip.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); 
            const dx = e.clientX - startX; const dy = e.clientY - startY;
            const newLeft = Math.max(0, Math.min(window.innerWidth - pip.offsetWidth, initialLeft + dx));
            const newTop = Math.max(0, Math.min(window.innerHeight - pip.offsetHeight, initialTop + dy));
            pip.style.left = `${newLeft}px`; pip.style.top = `${newTop}px`;
        });

        pip.addEventListener('pointerup', (e) => {
            isDragging = false;
            pip.releasePointerCapture(e.pointerId);
        });
    </script>
</body>
</html>
