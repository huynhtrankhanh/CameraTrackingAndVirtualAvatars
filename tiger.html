<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MediaPipe Tiger Avatar</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #1a1a2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none;
        }

        /* Main Scene */
        #scene {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        /* Draggable PIP Window */
        #pip-window {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 180px; height: 240px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.1);
            z-index: 100;
            cursor: grab;
            display: flex;
            flex-direction: column;
        }
        
        #pip-window:active { cursor: grabbing; }

        @media (min-width: 768px) {
            #pip-window {
                width: 240px; height: 180px;
            }
        }

        .drag-handle {
            height: 24px;
            background: rgba(40, 40, 40, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            user-select: none;
            pointer-events: none; /* Let parent handle drag */
        }

        .drag-handle::before {
            content: ""; width: 30px; height: 4px;
            background: #666; border-radius: 2px;
        }

        #pip-video-container {
            position: relative;
            flex: 1;
            background: #111;
        }

        /* Video and Canvas overlay mirroring */
        .mirrored { transform: scaleX(-1); }
        
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Loading Overlay */
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 140, 0, 0.3);
            border-top: 4px solid #FF8C00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="font-weight: 500;">Loading Tiger Avatar...</h2>
        <p style="color: #aaa; margin-top: 8px; font-size: 14px;">Please allow camera access.</p>
    </div>

    <div id="scene">
        <svg viewBox="-600 -600 1200 1200" preserveAspectRatio="xMidYMid meet">
            <g id="tiger-body" transform="translate(0, 150)">
                <path d="M-250,500 C-300,100 -200,-50 0,-150 C200,-50 300,100 250,500 Z" fill="#E67E22" />
                <path d="M-150,500 C-180,200 -100,50 0,0 C100,50 180,200 150,500 Z" fill="#FAD7A1" />
                <path d="M-220,100 Q-150,80 -180,140 Z" fill="#111" />
                <path d="M220,100 Q150,80 180,140 Z" fill="#111" />
                <path d="M-240,250 Q-150,220 -190,290 Z" fill="#111" />
                <path d="M240,250 Q150,220 190,290 Z" fill="#111" />
            </g>

            <g id="paw-l">
                <g id="paw-l-mesh">
                    <circle cx="0" cy="0" r="100" fill="#E67E22" />
                    <path d="M-60,-80 Q-60,-120 -80,-100 Z" fill="#fff" />
                    <path d="M-20,-95 Q-20,-140 -35,-120 Z" fill="#fff" />
                    <path d="M20,-95 Q20,-140 35,-120 Z" fill="#fff" />
                    <path d="M60,-80 Q60,-120 80,-100 Z" fill="#fff" />
                    <circle cx="0" cy="20" r="40" fill="#D35400" />
                    <circle cx="-50" cy="-30" r="20" fill="#D35400" />
                    <circle cx="-15" cy="-50" r="20" fill="#D35400" />
                    <circle cx="20" cy="-50" r="20" fill="#D35400" />
                    <circle cx="55" cy="-30" r="20" fill="#D35400" />
                    <path d="M-100,0 Q-60,-10 -90,20 Z" fill="#111" />
                    <path d="M100,0 Q60,-10 90,20 Z" fill="#111" />
                </g>
            </g>

            <g id="paw-r">
                <g id="paw-r-mesh">
                    <circle cx="0" cy="0" r="100" fill="#E67E22" />
                    <path d="M-60,-80 Q-60,-120 -80,-100 Z" fill="#fff" />
                    <path d="M-20,-95 Q-20,-140 -35,-120 Z" fill="#fff" />
                    <path d="M20,-95 Q20,-140 35,-120 Z" fill="#fff" />
                    <path d="M60,-80 Q60,-120 80,-100 Z" fill="#fff" />
                    <circle cx="0" cy="20" r="40" fill="#D35400" />
                    <circle cx="-50" cy="-30" r="20" fill="#D35400" />
                    <circle cx="-15" cy="-50" r="20" fill="#D35400" />
                    <circle cx="20" cy="-50" r="20" fill="#D35400" />
                    <circle cx="55" cy="-30" r="20" fill="#D35400" />
                    <path d="M-100,0 Q-60,-10 -90,20 Z" fill="#111" />
                    <path d="M100,0 Q60,-10 90,20 Z" fill="#111" />
                </g>
            </g>

            <g id="head">
                <g id="ears">
                    <path d="M-160,-120 C-250,-250 -100,-280 -80,-180 Z" fill="#E67E22" />
                    <path d="M-150,-140 C-210,-220 -110,-240 -100,-170 Z" fill="#fff" />
                    <path d="M-140,-150 C-180,-200 -120,-210 -110,-160 Z" fill="#F1948A" />
                    <path d="M160,-120 C250,-250 100,-280 80,-180 Z" fill="#E67E22" />
                    <path d="M150,-140 C210,-220 110,-240 100,-170 Z" fill="#fff" />
                    <path d="M140,-150 C180,-200 120,-210 110,-160 Z" fill="#F1948A" />
                </g>

                <path d="M-220,50 Q-280,150 -180,180 Q-240,250 -120,220 Z" fill="#fff" />
                <path d="M220,50 Q280,150 180,180 Q240,250 120,220 Z" fill="#fff" />

                <ellipse cx="0" cy="0" rx="200" ry="180" fill="#FF8C00" />

                <path d="M0,-180 L-20,-110 L20,-110 Z" fill="#111" />
                <path d="M-60,-170 L-50,-100 L-30,-120 Z" fill="#111" />
                <path d="M60,-170 L50,-100 L30,-120 Z" fill="#111" />
                
                <path d="M-200,-50 L-130,-40 L-200,-20 Z" fill="#111" />
                <path d="M200,-50 L130,-40 L200,-20 Z" fill="#111" />
                
                <path d="M-195,20 L-120,40 L-190,60 Z" fill="#111" />
                <path d="M195,20 L120,40 L190,60 Z" fill="#111" />

                <ellipse cx="0" cy="80" rx="110" ry="80" fill="#FFF" />

                <path d="M-40,60 C-40,40 40,40 40,60 L0,100 Z" fill="#F1948A" />
                <path d="M0,100 L0,130 M-40,110 Q0,150 40,110" stroke="#111" stroke-width="6" fill="none" stroke-linecap="round"/>

                <path d="M-60,90 L-180,70 M-70,110 L-190,110 M-60,130 L-170,150" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M60,90 L180,70 M70,110 L190,110 M60,130 L170,150" stroke="#111" stroke-width="4" stroke-linecap="round" fill="none"/>

                <g id="eye-l">
                    <path d="M-120,-30 Q-80,-70 -40,-20 Q-80,10 -120,-30 Z" fill="#fff" stroke="#111" stroke-width="8" stroke-linejoin="round"/>
                    <circle cx="-75" cy="-25" r="18" fill="#F1C40F" />
                    <circle cx="-75" cy="-25" r="8" fill="#111" />
                    <circle cx="-80" cy="-30" r="4" fill="#fff" />
                </g>
                <g id="eye-r">
                    <path d="M120,-30 Q80,-70 40,-20 Q80,10 120,-30 Z" fill="#fff" stroke="#111" stroke-width="8" stroke-linejoin="round"/>
                    <circle cx="75" cy="-25" r="18" fill="#F1C40F" />
                    <circle cx="75" cy="-25" r="8" fill="#111" />
                    <circle cx="70" cy="-30" r="4" fill="#fff" />
                </g>
            </g>
        </svg>
    </div>

    <div id="pip-window">
        <div class="drag-handle"></div>
        <div id="pip-video-container">
            <video id="input-video" class="mirrored" autoplay playsinline muted></video>
            <canvas id="output-canvas" class="mirrored"></canvas>
        </div>
    </div>

    <script>
        // --- 1. SVG Avatar Logic & Lerp Smoothing ---
        const headEl = document.getElementById('head');
        const pawLEl = document.getElementById('paw-l'); // Screen Left Paw
        const pawREl = document.getElementById('paw-r'); // Screen Right Paw

        // We use Linear Interpolation (Lerp) to smooth the jittery webcam landmarks
        const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

        const state = {
            head: { x: 0, y: 0, angle: 0, targetX: 0, targetY: 0, targetAngle: 0 },
            pawL: { x: -300, y: 300, angle: 0, targetX: -300, targetY: 300, targetAngle: 0, visible: true },
            pawR: { x: 300, y: 300, angle: 0, targetX: 300, targetY: 300, targetAngle: 0, visible: true }
        };

        const lerpAmt = 0.2; // Adjust for more/less smoothing

        function animateSVG() {
            // Lerp Head
            state.head.x = lerp(state.head.x, state.head.targetX, lerpAmt);
            state.head.y = lerp(state.head.y, state.head.targetY, lerpAmt);
            state.head.angle = lerp(state.head.angle, state.head.targetAngle, lerpAmt);
            headEl.setAttribute('transform', `translate(${state.head.x}, ${state.head.y - 100}) rotate(${state.head.angle})`);

            // Lerp Paws
            ['pawL', 'pawR'].forEach(paw => {
                const p = state[paw];
                p.x = lerp(p.x, p.targetX, lerpAmt);
                p.y = lerp(p.y, p.targetY, lerpAmt);
                p.angle = lerp(p.angle, p.targetAngle, lerpAmt);
                const el = paw === 'pawL' ? pawLEl : pawREl;
                el.setAttribute('transform', `translate(${p.x}, ${p.y}) rotate(${p.angle})`);
                el.style.opacity = p.visible ? 1 : 0.2; // Fade out if hand is lost
            });

            requestAnimationFrame(animateSVG);
        }
        animateSVG(); // Start render loop

        // --- 2. MediaPipe Holistic Integration ---
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading');

        let isInitialized = false;

        function onResults(results) {
            // Hide loading screen on first successful frame
            if (!isInitialized) {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 500);
                isInitialized = true;
            }

            // A. Draw Debug Skeletons on PIP Canvas
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Draw Face
            if (results.faceLandmarks) {
                drawConnectors(canvasCtx, results.faceLandmarks, FACEMESH_TESSELATION, {color: '#C0C0C070', lineWidth: 1});
                
                // Map Face to Tiger Head
                // Center of face is roughly landmark 1 (nose tip)
                const nose = results.faceLandmarks[1];
                const leftEye = results.faceLandmarks[33];
                const rightEye = results.faceLandmarks[263];

                // Note: The camera image is mirrored via CSS. MediaPipe X coordinates are unmirrored [0 to 1].
                // We invert the X mapping so that physical left moves to screen right.
                state.head.targetX = (0.5 - nose.x) * 1000; 
                state.head.targetY = (nose.y - 0.5) * 800;

                // Calculate head tilt angle
                const dx = (0.5 - rightEye.x) - (0.5 - leftEye.x);
                const dy = rightEye.y - leftEye.y;
                state.head.targetAngle = Math.atan2(dy, dx) * (180 / Math.PI);
            }

            // Draw & Map Right Hand (Controls Left Screen Paw)
            if (results.rightHandLandmarks) {
                drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, results.rightHandLandmarks, {color: '#FF0000', lineWidth: 1, radius: 2});
                
                const wrist = results.rightHandLandmarks[0];
                const middleFinger = results.rightHandLandmarks[9];

                state.pawL.visible = true;
                state.pawL.targetX = (0.5 - wrist.x) * 1400 - 250; // Offset outwards
                state.pawL.targetY = (wrist.y - 0.5) * 1200 + 200; // Offset downwards
                
                const dx = (0.5 - middleFinger.x) - (0.5 - wrist.x);
                const dy = middleFinger.y - wrist.y;
                state.pawL.targetAngle = (Math.atan2(dy, dx) * (180 / Math.PI)) + 90; // Default paw orientation adjustment
            } else {
                state.pawL.visible = false;
                state.pawL.targetY = 400; // Drop paw down when lost
            }

            // Draw & Map Left Hand (Controls Right Screen Paw)
            if (results.leftHandLandmarks) {
                drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, results.leftHandLandmarks, {color: '#FF0000', lineWidth: 1, radius: 2});
                
                const wrist = results.leftHandLandmarks[0];
                const middleFinger = results.leftHandLandmarks[9];

                state.pawR.visible = true;
                state.pawR.targetX = (0.5 - wrist.x) * 1400 + 250; 
                state.pawR.targetY = (wrist.y - 0.5) * 1200 + 200; 
                
                const dx = (0.5 - middleFinger.x) - (0.5 - wrist.x);
                const dy = middleFinger.y - wrist.y;
                state.pawR.targetAngle = (Math.atan2(dy, dx) * (180 / Math.PI)) + 90;
            } else {
                state.pawR.visible = false;
                state.pawR.targetY = 400;
            }

            canvasCtx.restore();
        }

        const holistic = new Holistic({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
        }});

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            smoothSegmentation: false,
            refineFaceLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({image: videoElement});
            },
            width: 480,
            height: 360,
            facingMode: 'user' // Front-facing camera
        });
        camera.start();

        // --- 3. Draggable PIP Window Logic ---
        const pip = document.getElementById('pip-window');
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;

        pip.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            
            const rect = pip.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;

            // Lock pointer to elements and disable CSS transitions during drag
            pip.setPointerCapture(e.pointerId);
            pip.style.bottom = 'auto';
            pip.style.right = 'auto';
            pip.style.left = `${initialLeft}px`;
            pip.style.top = `${initialTop}px`;
            pip.style.transition = 'none';
        });

        pip.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Prevent touch scrolling

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            // Keep within bounds roughly
            const newLeft = Math.max(0, Math.min(window.innerWidth - pip.offsetWidth, initialLeft + dx));
            const newTop = Math.max(0, Math.min(window.innerHeight - pip.offsetHeight, initialTop + dy));

            pip.style.left = `${newLeft}px`;
            pip.style.top = `${newTop}px`;
        });

        pip.addEventListener('pointerup', (e) => {
            isDragging = false;
            pip.releasePointerCapture(e.pointerId);
        });

    </script>
</body>
</html>
