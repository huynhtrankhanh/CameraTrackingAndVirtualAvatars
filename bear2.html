<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bear - Full Body Tracking</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #e3f2fd; /* Đổi màu nền chút cho tươi mát */
            font-family: sans-serif;
            touch-action: none;
        }

        #bear-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        svg {
            width: 100%; height: 100%;
            max-width: 800px; max-height: 800px;
        }

        #draggable-overlay {
            position: absolute; top: 20px; left: 20px;
            width: 160px;
            background: #2c3e50; border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            z-index: 1000; cursor: grab; user-select: none;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #draggable-overlay:active { cursor: grabbing; }

        #overlay-header {
            color: #ecf0f1; font-size: 12px; font-weight: bold;
            text-align: center; padding: 8px;
            background: #34495e; border-bottom: 2px solid #2c3e50;
        }

        #video-container {
            position: relative; width: 100%; height: 120px; background: #000;
        }
        video { display: none; }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
        }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px; font-weight: bold; color: #2c3e50;
            z-index: 500; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading">Loading Camera...</div>

    <div id="draggable-overlay">
        <div id="overlay-header">::: You are here :::</div>
        <div id="video-container">
            <video id="input_video" autoplay playsinline></video>
            <canvas id="output_canvas" width="160" height="120"></canvas>
        </div>
    </div>

    <div id="bear-container">
        <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

                
        
            <g id="bear-upper-body">

                <g id="bear-leg-r">
                <rect x="275" y="360" width="40" height="90" rx="20" fill="#5D4037" />
                <ellipse cx="295" cy="445" rx="25" ry="15" fill="#4E342E" />
                </g>

                <g id="bear-leg-l">
                <rect x="185" y="360" width="40" height="90" rx="20" fill="#8D6E63" />
                <ellipse cx="205" cy="445" rx="25" ry="15" fill="#6D4C41" />
                </g>

                <rect x="232" y="190" width="36" height="40" rx="8" fill="#5D4037" />

                <rect x="175" y="220" width="150" height="165" rx="40" fill="#795548" />
                
                <rect x="205" y="260" width="90" height="105" rx="35" fill="#D7CCC8" />


                <g id="bear-arm-l-upper">
                    <rect x="130" y="235" width="60" height="30" rx="15" fill="#8D6E63" />
                    <circle cx="130" cy="250" r="14" fill="#795548" />

                    <g id="bear-arm-l-lower">
                        <rect x="80" y="235" width="60" height="30" rx="15" fill="#8D6E63" />
                        <circle cx="80" cy="250" r="18" fill="#6D4C41" />
                    </g>
                </g>

                <g id="bear-arm-r-upper">
                    <rect x="310" y="235" width="60" height="30" rx="15" fill="#5D4037" />
                    <circle cx="370" cy="250" r="14" fill="#4E342E" />

                    <g id="bear-arm-r-lower">
                        <rect x="360" y="235" width="60" height="30" rx="15" fill="#5D4037" />
                        <circle cx="420" cy="250" r="18" fill="#4E342E" />
                    </g>
                </g>

                <g id="bear-head">

                <circle cx="200" cy="115" r="20" fill="#795548" />
                <circle cx="200" cy="115" r="10" fill="#D7CCC8" />
                <circle cx="300" cy="115" r="20" fill="#795548" />
                <circle cx="300" cy="115" r="10" fill="#D7CCC8" />
                
                <circle cx="250" cy="150" r="50" fill="#795548" />
                
                <ellipse cx="250" cy="170" rx="25" ry="18" fill="#D7CCC8" />
                <circle cx="250" cy="162" r="8" fill="#212121" />
                
                <g id="bear-eye-l" style="transform-origin: 230px 140px;">
                    <circle cx="230" cy="140" r="6" fill="#212121" />
                    <circle cx="232" cy="138" r="2" fill="#FFFFFF" />
                </g>
                
                <g id="bear-eye-r" style="transform-origin: 270px 140px;">
                    <circle cx="270" cy="140" r="6" fill="#212121" />
                    <circle cx="272" cy="138" r="2" fill="#FFFFFF" />
                </g>
                
                <ellipse id="bear-mouth" cx="250" cy="178" rx="12" ry="2" fill="#E12D39" style="transform-origin: 250px 178px;" />
                </g>   
                

            </g>

            
            
        </svg>
    </div>

    <script>
        //1. DRAGGABLE OVERLAY LOGIC
        const overlay = document.getElementById('draggable-overlay');
        const header = document.getElementById('overlay-header');
        let isDragging = false, currentX, currentY, initialX, initialY, xOffset = 20, yOffset = 20;

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === overlay || e.target === header || e.target.parentNode === header) isDragging = true;
        }

        function dragEnd() { isDragging = false; }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX; yOffset = currentY;
                overlay.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        overlay.addEventListener("touchstart", dragStart, { passive: false });
        overlay.addEventListener("touchend", dragEnd, { passive: false });
        overlay.addEventListener("touchmove", drag, { passive: false });
        overlay.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);


        // 2. BEAR ANIMATION SETUP
        const bearParts = {
            upperBody: document.getElementById('bear-upper-body'),
            head: document.getElementById('bear-head'),
            eyeL: document.getElementById('bear-eye-l'),
            eyeR: document.getElementById('bear-eye-r'),
            mouth: document.getElementById('bear-mouth'),
            armLUpper: document.getElementById('bear-arm-l-upper'), 
            armLLower: document.getElementById('bear-arm-l-lower'), 
            armRUpper: document.getElementById('bear-arm-r-upper'), 
            armRLower: document.getElementById('bear-arm-r-lower'), 
            legL: document.getElementById('bear-leg-l'),
            legR: document.getElementById('bear-leg-r')
        };

        let currentRot = { torsoX: 0, torsoAngle: 0, head: 0, armLUpper: 0, armLLower: 0, armRUpper: 0, armRLower: 0, legL: 0, legR: 0, eyeScaleL: 1, eyeScaleR: 1, mouthScale: 1 };
        let targetRot =  { torsoX: 0, torsoAngle: 0, head: 0, armLUpper: 0, armLLower: 0, armRUpper: 0, armRLower: 0, legL: 0, legR: 0, eyeScaleL: 1, eyeScaleR: 1, mouthScale: 1 };

        function animateBear() {
            const lerpSpeed = 0.2; 
            for (let part in currentRot) {
                currentRot[part] += (targetRot[part] - currentRot[part]) * lerpSpeed;
            }

            bearParts.upperBody.setAttribute('transform', `translate(${currentRot.torsoX}, 0) rotate(${currentRot.torsoAngle} 250 340)`);

            bearParts.head.setAttribute('transform', `rotate(${currentRot.head} 250 170)`);

            bearParts.eyeL.style.transform = `scale(1, ${currentRot.eyeScaleL})`;
            bearParts.eyeR.style.transform = `scale(1, ${currentRot.eyeScaleR})`;
            bearParts.mouth.style.transform = `scale(1, ${currentRot.mouthScale})`;
            
            // Rotate upper arms
            bearParts.armLUpper.setAttribute('transform', `rotate(${currentRot.armLUpper} 180 250)`);
            bearParts.armRUpper.setAttribute('transform', `rotate(${currentRot.armRUpper} 320 250)`);
            
            // Rotate lower arms
            bearParts.armLLower.setAttribute('transform', `rotate(${currentRot.armLLower} 130 250)`);
            bearParts.armRLower.setAttribute('transform', `rotate(${currentRot.armRLower} 370 250)`);

            bearParts.legL.setAttribute('transform', `rotate(${currentRot.legL} 205 340)`);
            bearParts.legR.setAttribute('transform', `rotate(${currentRot.legR} 295 340)`);
            

            requestAnimationFrame(animateBear);
        }
        animateBear();

        //3. MATH: CALCULATE ANGLE USING ATAN2 (SVG 2D)
        function getAngle(p1, p2, width, height) {
            const dx = (p2.x - p1.x) * width;
            const dy = (p2.y - p1.y) * height;
            return Math.atan2(dy, dx) * 180 / Math.PI;
        }

        function getDistanceFace(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        //4. MEDIAPIPE POSE LOGIC 
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');

        function onResults(results) {
            if (loadingText.style.display !== 'none') loadingText.style.display = 'none';

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const cw = canvasElement.width;
                const ch = canvasElement.height;

                drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                drawLandmarks(canvasCtx, lm, {color: '#FF0000', lineWidth: 1, radius: 2});

                const visThreshold = 0.5;

                // 1. HEAD TRACKING
                if (lm[7].visibility > visThreshold && lm[8].visibility > visThreshold) {
                    targetRot.head = getAngle(lm[8], lm[7], cw, ch);
                }

                if (lm[11].visibility > visThreshold && lm[12].visibility > visThreshold) {
                    
                    // Calculate shoulder midpoint X
                    const shoulderMidX = (lm[11].x + lm[12].x) / 2;
                    
                    targetRot.torsoX = (0.5 - shoulderMidX) * 300; 
                    targetRot.torsoAngle = getAngle(lm[12], lm[11], cw, ch);

                }

                // 1.5 FACE EXPRESSIONS (EYES & MOUTH)
                if (results.faceLandmarks) {
                const face = results.faceLandmarks;
                
                const eyeL_Dist = getDistanceFace(face[386], face[374]);
                const eyeR_Dist = getDistanceFace(face[159], face[145]);
 
                const mouth_Dist = getDistanceFace(face[13], face[14]);

                targetRot.eyeScaleL = eyeL_Dist < 0.015 ? 0.1 : 1;
                targetRot.eyeScaleR = eyeR_Dist < 0.015 ? 0.1 : 1;

                let mScale = mouth_Dist / 0.01; 
                if (mScale < 1) mScale = 1;
                if (mScale > 8) mScale = 8;
                targetRot.mouthScale = mScale;
            }

            canvasCtx.restore();
        
                // 2. LEFT ARM (= right arm on screen)
                // Landmarks: Shoulder 12 -> Elbow 14 -> Wrist 16
                if (lm[12].visibility > visThreshold && lm[14].visibility > visThreshold && lm[16].visibility > visThreshold) {
                    let angleUpperL = getAngle(lm[12], lm[14], cw, ch) - 180;
                    let angleLowerL = getAngle(lm[14], lm[16], cw, ch) - 180;

                    targetRot.armLUpper = angleUpperL;
                    targetRot.armLLower = angleLowerL - angleUpperL; 
                }

                // 3. RIGHT ARM (= left arm on screen)
                // Landmarks: Shoulder 11 -> Elbow 13 -> Wrist 15
                if (lm[11].visibility > visThreshold && lm[13].visibility > visThreshold && lm[15].visibility > visThreshold) {
                    
                    let angleUpperR = getAngle(lm[11], lm[13], cw, ch);
                    let angleLowerR = getAngle(lm[13], lm[15], cw, ch);

                    targetRot.armRUpper = angleUpperR;
                    targetRot.armRLower = angleLowerR - angleUpperR;
                }

            } else {
                targetRot = { head: 0, armLUpper: 0, armLLower: 0, armRUpper: 0, armRLower: 0, legL: 0, legR: 0 };
            }
            canvasCtx.restore();
        }

        const holistic = new Holistic({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`});
        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            refineFaceLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        holistic.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await holistic.send({image: videoElement}); },
            width: 320, height: 240, facingMode: 'user'
        });
        camera.start();
    </script>
</body>
</html>
